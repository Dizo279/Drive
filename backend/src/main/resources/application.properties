# Cấu hình Database MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/file_manager_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456

# Hibernate tự động cập nhật schema (bảng)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thư mục lưu trữ file upload — CHỈ dùng đường dẫn này (cần quyền GHI trên Windows)
# Nếu backend không start / upload lỗi: CMD (Admin) → icacls "D:\mydrive-storage\uploads" /grant Users:(OI)(CI)M /T
app.storage.upload-dir=D:/mydrive-storage/uploads

# Secret key cho JWT (chuỗi bảo mật)
app.jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
app.jwt.expiration-ms=86400000

# Cho phép nhận dữ liệu lên đến 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.max-http-header-size=1048576

spring.jersey.application-path=/api

# Cho phép Spring Boot lắng nghe kết nối từ các thiết bị khác trong mạng Wi-Fi (như điện thoại)
server.address=0.0.0.0