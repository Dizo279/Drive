<div class="auth-wrapper">
  <div class="auth-card">
    
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="white" width="32" height="32">
        <path d="M3 6a3 3 0 013-3h12a3 3 0 013 3v2H3V6zm0 4h18v8a3 3 0 01-3 3H6a3 3 0 01-3-3v-8z"/>
      </svg>
    </div>
    
    <h1 class="auth-title">Create your ID</h1>
    <p class="auth-subtitle">One account for everything Ethereal.</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="input-group">
        <input type="text" placeholder="Username" formControlName="username">
      </div>
      
      <div class="input-group">
        <input type="password" placeholder="Password" formControlName="password">
      </div>

      <div class="error-text" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading">
        <span *ngIf="!loading">Continue</span>
        <span *ngIf="loading">Creating account...</span>
      </button>
    </form>

    <div class="auth-links">
      Already have an account? <a routerLink="/login">Sign in.</a>
    </div>

  </div>
</div>
