<div class="auth-page">
  <div class="auth-card">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="white" width="24" height="24">
          <path d="M3 6a3 3 0 013-3h12a3 3 0 013 3v2H3V6zm0 4h18v8a3 3 0 01-3 3H6a3 3 0 01-3-3v-8z"/>
        </svg>
      </div>
      <span class="brand-name">MyDrive</span>
    </div>

    <div class="tab-row">
      <div class="tab active">Đăng nhập</div>
      <a routerLink="/register" class="tab">Đăng ký</a>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="field">
        <label>Tài khoản</label>
        <div class="input-wrap">
          <input type="text" formControlName="username" placeholder="Nhập username"
                 [class.invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
        </div>
        <span class="field-error"
              *ngIf="loginForm.get('username')?.hasError('required') && loginForm.get('username')?.touched">
          Vui lòng nhập username
        </span>
      </div>

      <div class="field">
        <label>Mật khẩu</label>
        <div class="input-wrap">
          <input [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password" placeholder="Nhập mật khẩu"
                 [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <button type="button" class="eye-btn" (click)="hidePassword = !hidePassword" tabindex="-1">
            <svg *ngIf="hidePassword" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="!hidePassword" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error"
              *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">
          Vui lòng nhập mật khẩu
        </span>
      </div>

      <div class="remember-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="rememberMe" [ngModelOptions]="{standalone: true}">
          <span class="checkmark"></span>
          <span>Ghi nhớ</span>
        </label>
        <a class="forgot-link">Quên mật khẩu?</a>
      </div>

      <div class="error-banner" *ngIf="errorMsg">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ errorMsg }}</span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading || loginForm.invalid">
        <svg *ngIf="loading" class="spinner" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
        {{ loading ? 'Đang xác thực...' : 'Đăng nhập' }}
      </button>

    </form>

    <p class="footer-link">
      Chưa có tài khoản? <a routerLink="/register">Đăng ký ngay</a>
    </p>
  </div>
</div>
