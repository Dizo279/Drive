<div class="auth-wrapper">
  <div class="auth-card">
    
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="white" width="32" height="32">
        <path d="M3 6a3 3 0 013-3h12a3 3 0 013 3v2H3V6zm0 4h18v8a3 3 0 01-3 3H6a3 3 0 01-3-3v-8z"/>
      </svg>
    </div>
    
    <h1 class="auth-title">Sign in to Ethereal</h1>
    <p class="auth-subtitle">Access your secure cloud workspace.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="input-group">
        <input type="text" placeholder="Username" formControlName="username" autocomplete="username">
      </div>
      
      <div class="input-group">
        <input type="password" placeholder="Password" formControlName="password" autocomplete="current-password">
      </div>

      <div class="error-text" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Please wait...</span>
        <svg *ngIf="!loading" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>

    <div class="auth-links">
      Don't have an Apple ID? <br>
      <a routerLink="/register">Create yours now.</a>
    </div>

  </div>
</div>
